<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>LoadoutAi Radar</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f1923;
            color: white;
            transition: background-color 0.5s ease;
        }

        #status-container {
            text-align: center;
            padding: 40px;
            border-radius: 15px;
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid transparent;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 3rem;
            text-transform: uppercase;
        }

        p {
            margin: 0;
            font-size: 1.2rem;
            color: #ece8e1;
            opacity: 0.8;
        }

        .status-closed {
            border-color: #555 !important;
        }

        .status-closed h1 {
            color: #888;
        }

        .status-menu {
            border-color: #00ffcc !important;
        }

        .status-menu h1 {
            color: #00ffcc;
        }

        .status-pregame {
            border-color: #ff4655 !important;
            background: rgba(255, 70, 85, 0.1) !important;
        }

        .status-pregame h1 {
            color: #ff4655;
        }

        .status-ingame {
            border-color: #00ff88 !important;
            background: rgba(0, 255, 136, 0.1) !important;
            box-shadow: 0 10px 30px rgba(0, 255, 136, 0.2);
        }

        .status-ingame h1 {
            color: #00ff88;
        }

        #buy-overlay {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 320px;
            background: rgba(15, 25, 35, 0.95);
            border: 2px solid #00ff88;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0, 255, 136, 0.25);
            backdrop-filter: blur(10px);
            z-index: 1000;
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            opacity: 1;
            transform: translateY(0);
        }

        #buy-overlay.hidden {
            opacity: 0;
            transform: translateY(-20px);
            pointer-events: none;
        }

        #close-overlay {
            position: absolute;
            top: 10px;
            right: 12px;
            background: transparent;
            border: none;
            color: #888;
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.2s;
        }

        #close-overlay:hover {
            color: #ff4655;
        }

        .phase-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .pulse-green {
            width: 8px;
            height: 8px;
            background-color: #00ff88;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px #00ff88;
            animation: pulse-green 1.5s infinite;
        }

        @keyframes pulse-green {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.7);
            }
            70% {
                transform: scale(1);
                box-shadow: 0 0 0 8px rgba(0, 255, 136, 0);
            }
            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(0, 255, 136, 0);
            }
        }

        #round-overlay {
            font-size: 0.85rem;
            font-weight: bold;
            letter-spacing: 1px;
            color: #888;
            text-transform: uppercase;
        }

        #buy-overlay h2 {
            margin: 0;
            font-size: 1.4rem;
            color: white;
            letter-spacing: 0.5px;
        }

        .buy-status {
            margin: 4px 0 15px 0;
            font-size: 0.95rem;
            color: #00ff88;
            font-weight: 600;
        }

        .timer-container {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        #timer-bar {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #00ff88, #00cca3);
            transition: width 1s linear;
        }

        #timer-text {
            font-size: 0.85rem;
            color: #ccc;
            text-align: right;
            margin-bottom: 15px;
        }

        .recommendation-box {
            background: rgba(255, 255, 255, 0.05);
            border-left: 3px solid #00ff88;
            padding: 10px;
            border-radius: 0 6px 6px 0;
        }

        .recommendation-box strong {
            font-size: 0.85rem;
            color: #00ff88;
            display: block;
            margin-bottom: 4px;
        }

        .recommendation-box p {
            font-size: 0.85rem !important;
            margin: 0;
            opacity: 0.9;
            color: #ece8e1;
        }
    </style>
</head>

<body>

    <div id="status-container" class="status-closed">
        <h1 id="status-text">GAME CLOSED</h1>
        <p id="detail-text">Waiting for Valorant to start...</p>
    </div>

    <div id="buy-overlay" class="hidden">
        <button id="close-overlay" onclick="hideOverlay()">&times;</button>
        <div class="phase-header">
            <span class="pulse-green"></span>
            <span id="round-overlay">ROUND -</span>
        </div>
        <h2>BUY PHASE</h2>
        <p class="buy-status">BUY AVAILABLE!</p>
        
        <div class="timer-container">
            <div id="timer-bar"></div>
        </div>
        <div id="timer-text">0s remaining</div>

        <div class="recommendation-box">
            <strong>AI Recommendation:</strong>
            <p id="recommendation-text">Analyzing economy...</p>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script>
        const socket = io('http://localhost:3000');

        const container = document.getElementById('status-container');
        const title = document.getElementById('status-text');
        const details = document.getElementById('detail-text');

        socket.on('valorant_status', (data) => {
            console.log("New status received:", data);
            container.className = '';

            if (data.status === 'CLOSED') {
                container.classList.add('status-closed');
                title.innerText = 'GAME CLOSED';
                details.innerText = 'Waiting for Valorant to start...';
            }
            else if (data.status === 'MENU') {
                container.classList.add('status-menu');
                title.innerText = 'IN MENU';
                details.innerText = 'Searching for a match or in lobby...';
            }
            else if (data.status === 'PREGAME') {
                container.classList.add('status-pregame');
                title.innerText = 'AGENT SELECTION!';
                details.innerText = `Match ID: ${data.matchId}`;
            }
            else if (data.status === 'INGAME') {
                container.classList.add('status-ingame');
                title.innerText = 'IN-GAME!';
                details.innerText = `Playing on ${data.mapName || 'Unknown Map'} (${data.mode || 'Unknown Mode'})`;
            }
        });

        socket.on('connect', () => console.log('Connected to LoadoutAi server'));
        socket.on('disconnect', () => {
            title.innerText = 'NO CONNECTION';
            details.innerText = 'NestJS server is offline.';
            container.className = 'status-closed';
            buyOverlay.classList.add('hidden');
        });

        const buyOverlay = document.getElementById('buy-overlay');
        const roundOverlay = document.getElementById('round-overlay');
        const timerBar = document.getElementById('timer-bar');
        const timerText = document.getElementById('timer-text');
        const recommendationText = document.getElementById('recommendation-text');

        let maxTime = 30;
        let overlayManuallyClosed = false;

        socket.on('buy_phase', (data) => {
            console.log("Buy phase event received:", data);
            
            if (data.available) {
                if (data.time === 30 || data.time === 45) {
                    overlayManuallyClosed = false;
                    maxTime = data.time;
                }

                if (!overlayManuallyClosed) {
                    buyOverlay.classList.remove('hidden');
                    roundOverlay.innerText = `ROUND ${data.round}`;
                    timerText.innerText = `${data.time}s remaining`;
                    
                    const percentage = (data.time / maxTime) * 100;
                    timerBar.style.width = `${percentage}%`;

                    if (data.round === 1 || data.round === 13) {
                        recommendationText.innerText = "Pistol Round: Buy Light Shield + Abilities or Ghost.";
                    } else if (data.round === 2 || data.round === 14) {
                        recommendationText.innerText = "Eco / Force Buy: Spectre if you won the previous round, pistols in eco if you lost.";
                    } else if (data.round >= 25) {
                        recommendationText.innerText = "OVERTIME: Buy everything you can! All or nothing.";
                    } else {
                        recommendationText.innerText = "Full Buy: Vandal/Phantom + Heavy Shield + Full Abilities.";
                    }
                }
            } else {
                buyOverlay.classList.add('hidden');
            }
        });

        function hideOverlay() {
            overlayManuallyClosed = true;
            buyOverlay.classList.add('hidden');
        }
    </script>
</body>

</html>
