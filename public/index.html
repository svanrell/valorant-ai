<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>LoadoutAi Radar</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f1923;
            color: white;
            transition: background-color 0.5s ease;
        }

        #status-container {
            text-align: center;
            padding: 40px;
            border-radius: 15px;
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid transparent;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 3rem;
            text-transform: uppercase;
        }

        p {
            margin: 0;
            font-size: 1.2rem;
            color: #ece8e1;
            opacity: 0.8;
        }

        .status-closed {
            border-color: #555 !important;
        }

        .status-closed h1 {
            color: #888;
        }

        .status-menu {
            border-color: #00ffcc !important;
        }

        .status-menu h1 {
            color: #00ffcc;
        }

        .status-pregame {
            border-color: #ff4655 !important;
            background: rgba(255, 70, 85, 0.1) !important;
        }

        .status-pregame h1 {
            color: #ff4655;
        }

        .status-ingame {
            border-color: #00ff88 !important;
            background: rgba(0, 255, 136, 0.1) !important;
            box-shadow: 0 10px 30px rgba(0, 255, 136, 0.2);
        }

        .status-ingame h1 {
            color: #00ff88;
        }

        #buy-overlay {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 320px;
            background: rgba(15, 25, 35, 0.95);
            border: 2px solid #00ff88;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0, 255, 136, 0.25);
            backdrop-filter: blur(10px);
            z-index: 1000;
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            opacity: 1;
            transform: translateY(0);
        }

        #buy-overlay.hidden {
            opacity: 0;
            transform: translateY(-20px);
            pointer-events: none;
        }

        #close-overlay {
            position: absolute;
            top: 10px;
            right: 12px;
            background: transparent;
            border: none;
            color: #888;
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.2s;
        }

        #close-overlay:hover {
            color: #ff4655;
        }

        .phase-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .pulse-green {
            width: 8px;
            height: 8px;
            background-color: #00ff88;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px #00ff88;
            animation: pulse-green 1.5s infinite;
        }

        @keyframes pulse-green {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.7);
            }
            70% {
                transform: scale(1);
                box-shadow: 0 0 0 8px rgba(0, 255, 136, 0);
            }
            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(0, 255, 136, 0);
            }
        }

        #round-overlay {
            font-size: 0.85rem;
            font-weight: bold;
            letter-spacing: 1px;
            color: #888;
            text-transform: uppercase;
        }

        #buy-overlay h2 {
            margin: 0;
            font-size: 1.4rem;
            color: white;
            letter-spacing: 0.5px;
        }

        .buy-status {
            margin: 4px 0 15px 0;
            font-size: 0.95rem;
            color: #00ff88;
            font-weight: 600;
        }

        .timer-container {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        #timer-bar {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #00ff88, #00cca3);
            transition: width 1s linear;
        }

        #timer-text {
            font-size: 0.85rem;
            color: #ccc;
            text-align: right;
            margin-bottom: 15px;
        }

        .recommendation-box {
            background: rgba(255, 255, 255, 0.05);
            border-left: 3px solid #00ff88;
            padding: 10px;
            border-radius: 0 6px 6px 0;
        }

        .recommendation-box strong {
            font-size: 0.85rem;
            color: #00ff88;
            display: block;
            margin-bottom: 4px;
        }

        .recommendation-box p {
            font-size: 0.85rem !important;
            margin: 0;
            opacity: 0.9;
            color: #ece8e1;
        }

        /* Pregame Agent Selection Grid */
        .pregame-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            margin-top: 25px;
            width: 100%;
            max-width: 800px;
            transition: all 0.3s ease;
        }

        .pregame-grid.hidden {
            display: none;
        }

        .pregame-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-width: 120px;
            text-align: center;
            position: relative;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .pregame-card.pre-selected {
            border-color: #00f0ff;
            background: rgba(0, 240, 255, 0.08);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
            animation: pulse-border 2s infinite alternate;
        }

        .pregame-card.locked {
            border-color: #ff4655;
            background: rgba(255, 70, 85, 0.15);
            box-shadow: 0 0 15px rgba(255, 70, 85, 0.3);
        }

        .player-number {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.4);
            font-weight: bold;
            margin-bottom: 2px;
            letter-spacing: 1px;
        }

        .player-level {
            font-size: 0.75rem;
            color: #00ffcc;
            font-weight: 600;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        .player-rank-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            font-size: 0.7rem;
            color: #ffb703;
            font-weight: bold;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .pregame-rank-icon {
            width: 18px;
            height: 18px;
            object-fit: contain;
        }

        .pregame-agent-icon {
            width: 70px;
            height: 70px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background-color: rgba(0, 0, 0, 0.5);
            object-fit: cover;
            margin-bottom: 10px;
            transition: transform 0.3s ease;
        }

        .pregame-agent-name {
            font-size: 0.95rem;
            font-weight: 700;
            color: #ece8e1;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .pregame-status-badge {
            font-size: 0.75rem;
            font-weight: bold;
            padding: 3px 10px;
            border-radius: 4px;
            margin-top: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .badge-selecting {
            background: rgba(255, 255, 255, 0.1);
            color: #aaa;
        }

        .badge-prepick {
            background: rgba(0, 240, 255, 0.2);
            color: #00f0ff;
        }

        .badge-locked {
            background: #ff4655;
            color: white;
        }

        @keyframes pulse-border {
            0% {
                box-shadow: 0 0 5px rgba(0, 240, 255, 0.1);
                border-color: rgba(0, 240, 255, 0.4);
            }
            100% {
                box-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
                border-color: rgba(0, 240, 255, 1);
            }
        }

        @media (max-width: 768px) {
            .pregame-grid {
                grid-template-columns: repeat(2, 1fr);
                justify-content: center;
            }
        }

        @media (max-width: 480px) {
            .pregame-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <div id="status-container" class="status-closed">
        <h1 id="status-text">GAME CLOSED</h1>
        <p id="detail-text">Waiting for Valorant to start...</p>
        <div id="pregame-team-container" class="pregame-grid hidden"></div>
    </div>

    <div id="buy-overlay" class="hidden">
        <button id="close-overlay" onclick="hideOverlay()">&times;</button>
        <div class="phase-header">
            <span class="pulse-green"></span>
            <span id="round-overlay">ROUND -</span>
        </div>
        <h2>BUY PHASE</h2>
        <p class="buy-status">BUY AVAILABLE!</p>
        
        <div class="timer-container">
            <div id="timer-bar"></div>
        </div>
        <div id="timer-text">0s remaining</div>

        <div class="recommendation-box">
            <strong>AI Recommendation:</strong>
            <p id="recommendation-text">Analyzing economy...</p>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script>
        const socket = io('http://localhost:3000');

        const container = document.getElementById('status-container');
        const title = document.getElementById('status-text');
        const details = document.getElementById('detail-text');

        let agentsMap = {};
        let ranksMap = {};

        async function loadAgents() {
            try {
                const response = await fetch('https://valorant-api.com/v1/agents?isPlayableCharacter=true&language=es-ES');
                const result = await response.json();
                if (result.status === 200) {
                    result.data.forEach(agent => {
                        agentsMap[agent.uuid.toLowerCase()] = {
                            name: agent.displayName,
                            icon: agent.displayIcon
                        };
                    });
                }
            } catch (err) {
                console.error("Failed to load agent assets:", err);
            }
        }

        async function loadRanks() {
            try {
                const response = await fetch('https://valorant-api.com/v1/competitivetiers');
                const result = await response.json();
                if (result.status === 200 && result.data.length > 0) {
                    const latestTierSet = result.data[result.data.length - 1];
                    latestTierSet.tiers.forEach(tierObj => {
                        ranksMap[tierObj.tier] = {
                            name: tierObj.tierName,
                            icon: tierObj.largeIcon
                        };
                    });
                }
            } catch (err) {
                console.error("Failed to load rank assets:", err);
            }
        }

        loadAgents();
        loadRanks();

        function renderPregamePlayers(players) {
            const pregameContainer = document.getElementById('pregame-team-container');
            pregameContainer.innerHTML = '';
            
            if (!players || players.length === 0) {
                pregameContainer.classList.add('hidden');
                return;
            }
            
            pregameContainer.classList.remove('hidden');
            
            players.forEach((player, index) => {
                const card = document.createElement('div');
                card.className = 'pregame-card';
                
                // Aplicar fondo dinámico con la tarjeta del jugador
                if (player.playerCardId) {
                    card.style.backgroundImage = `linear-gradient(rgba(15, 25, 35, 0.85), rgba(15, 25, 35, 0.95)), url(https://media.valorant-api.com/playercards/${player.playerCardId}/wideart.png)`;
                    card.style.backgroundSize = 'cover';
                    card.style.backgroundPosition = 'center';
                } else {
                    card.style.backgroundImage = 'none';
                }
                
                const agentId = (player.agentId || '').toLowerCase();
                const selectionState = player.state; // "", "selected", "locked"
                
                let agentName = 'SELECCIONANDO';
                let agentIconHtml = `
                    <svg width="70" height="70" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" style="margin-bottom: 10px;">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                `;
                
                if (agentId && agentsMap[agentId]) {
                    agentName = agentsMap[agentId].name;
                    agentIconHtml = `<img src="${agentsMap[agentId].icon}" class="pregame-agent-icon" alt="${agentName}">`;
                }
                
                let badgeText = 'SELECCIONANDO';
                let badgeClass = 'badge-selecting';
                
                if (selectionState === 'selected') {
                    card.classList.add('pre-selected');
                    badgeText = 'PRE-PICK';
                    badgeClass = 'badge-prepick';
                } else if (selectionState === 'locked') {
                    card.classList.add('locked');
                    badgeText = 'BLOQUEADO';
                    badgeClass = 'badge-locked';
                }
                
                let rankHtml = '<div class="player-rank-container"><span>Sin Rango</span></div>';
                if (player.rank !== undefined && ranksMap[player.rank]) {
                    const rankInfo = ranksMap[player.rank];
                    rankHtml = `
                        <div class="player-rank-container">
                            ${rankInfo.icon ? `<img src="${rankInfo.icon}" class="pregame-rank-icon" alt="${rankInfo.name}">` : ''}
                            <span>${rankInfo.name}</span>
                        </div>
                    `;
                }

                const levelText = player.level ? `Nivel ${player.level}` : 'Nivel -';
                card.innerHTML = `
                    <div class="player-number">ALIADO ${index + 1}</div>
                    <div class="player-level">${levelText}</div>
                    ${rankHtml}
                    ${agentIconHtml}
                    <div class="pregame-agent-name">${agentName}</div>
                    <div class="pregame-status-badge ${badgeClass}">${badgeText}</div>
                `;
                
                pregameContainer.appendChild(card);
            });
        }

        socket.on('valorant_status', (data) => {
            console.log("New status received:", data);
            container.className = '';

            // Ocultar pregame por defecto en otros estados
            if (data.status !== 'PREGAME') {
                document.getElementById('pregame-team-container').classList.add('hidden');
            }

            if (data.status === 'CLOSED') {
                container.classList.add('status-closed');
                title.innerText = 'GAME CLOSED';
                details.innerText = 'Waiting for Valorant to start...';
            }
            else if (data.status === 'MENU') {
                container.classList.add('status-menu');
                title.innerText = 'IN MENU';
                details.innerText = 'Searching for a match or in lobby...';
            }
            else if (data.status === 'PREGAME') {
                container.classList.add('status-pregame');
                title.innerText = 'AGENT SELECTION!';
                details.innerText = `Match ID: ${data.matchId}`;
                renderPregamePlayers(data.players);
            }
            else if (data.status === 'INGAME') {
                container.classList.add('status-ingame');
                title.innerText = 'IN-GAME!';
                details.innerText = `Playing on ${data.mapName || 'Unknown Map'} (${data.mode || 'Unknown Mode'})`;
            }
        });

        socket.on('connect', () => console.log('Connected to LoadoutAi server'));
        socket.on('disconnect', () => {
            title.innerText = 'NO CONNECTION';
            details.innerText = 'NestJS server is offline.';
            container.className = 'status-closed';
            buyOverlay.classList.add('hidden');
        });

        const buyOverlay = document.getElementById('buy-overlay');
        const roundOverlay = document.getElementById('round-overlay');
        const timerBar = document.getElementById('timer-bar');
        const timerText = document.getElementById('timer-text');
        const recommendationText = document.getElementById('recommendation-text');

        let maxTime = 30;
        let overlayManuallyClosed = false;

        socket.on('buy_phase', (data) => {
            console.log("Buy phase event received:", data);
            
            if (data.available) {
                if (data.time === 30 || data.time === 45) {
                    overlayManuallyClosed = false;
                    maxTime = data.time;
                }

                if (!overlayManuallyClosed) {
                    buyOverlay.classList.remove('hidden');
                    roundOverlay.innerText = `ROUND ${data.round}`;
                    timerText.innerText = `${data.time}s remaining`;
                    
                    const percentage = (data.time / maxTime) * 100;
                    timerBar.style.width = `${percentage}%`;

                    if (data.round === 1 || data.round === 13) {
                        recommendationText.innerText = "Pistol Round: Buy Light Shield + Abilities or Ghost.";
                    } else if (data.round === 2 || data.round === 14) {
                        recommendationText.innerText = "Eco / Force Buy: Spectre if you won the previous round, pistols in eco if you lost.";
                    } else if (data.round >= 25) {
                        recommendationText.innerText = "OVERTIME: Buy everything you can! All or nothing.";
                    } else {
                        recommendationText.innerText = "Full Buy: Vandal/Phantom + Heavy Shield + Full Abilities.";
                    }
                }
            } else {
                buyOverlay.classList.add('hidden');
            }
        });

        function hideOverlay() {
            overlayManuallyClosed = true;
            buyOverlay.classList.add('hidden');
        }
    </script>
</body>

</html>
